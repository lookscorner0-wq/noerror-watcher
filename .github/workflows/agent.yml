name: LinkedIn Watcher

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install requests linkedin-api
      - run: python agent.py
        env:
          env:
          SHEET_URL: ${{ secrets.SHEET_URL }}
          OPENAI_KEY:   ${{ secrets.OPENAI_KEY }}
          LI_AT:        ${{ secrets.LI_AT }}
          LI_EMAIL:     ${{ secrets.LI_EMAIL }}
          LI_PASSWORD:  ${{ secrets.LI_PASSWORD }}
          LI_JSESSIONID: ${{ secrets.LI_JSESSIONID }}
      - name: Save seen urls
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add seen_urls.json
          git diff --staged --quiet || git commit -m "update seen urls"
          git push
